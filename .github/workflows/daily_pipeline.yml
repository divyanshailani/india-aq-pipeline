name: Global AQI Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger still works for emergencies

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    
    env:
      # Database connection (Points to Azure Flexible PostgreSQL)
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      
      # API Keys
      OPENAQ_KEYS: ${{ secrets.OPENAQ_KEYS }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Debug - Verify Secrets Are Loaded
        run: |
          echo "=== Checking environment variables ==="
          if [ -z "$POSTGRES_HOST" ]; then echo "❌ POSTGRES_HOST is EMPTY"; else echo "✅ POSTGRES_HOST is set (length: ${#POSTGRES_HOST})"; fi
          if [ -z "$POSTGRES_PORT" ]; then echo "❌ POSTGRES_PORT is EMPTY"; else echo "✅ POSTGRES_PORT is set (value: $POSTGRES_PORT)"; fi
          if [ -z "$POSTGRES_USER" ]; then echo "❌ POSTGRES_USER is EMPTY"; else echo "✅ POSTGRES_USER is set (length: ${#POSTGRES_USER})"; fi
          if [ -z "$POSTGRES_PASSWORD" ]; then echo "❌ POSTGRES_PASSWORD is EMPTY"; else echo "✅ POSTGRES_PASSWORD is set (length: ${#POSTGRES_PASSWORD})"; fi
          if [ -z "$POSTGRES_DB" ]; then echo "❌ POSTGRES_DB is EMPTY"; else echo "✅ POSTGRES_DB is set (length: ${#POSTGRES_DB})"; fi
          if [ -z "$OPENAQ_KEYS" ]; then echo "❌ OPENAQ_KEYS is EMPTY"; else echo "✅ OPENAQ_KEYS is set (length: ${#OPENAQ_KEYS})"; fi
          echo "=== Quick DB connectivity test ==="
          python -c "
          import os
          host = os.environ.get('POSTGRES_HOST', '').strip()
          port = os.environ.get('POSTGRES_PORT', '').strip()
          user = os.environ.get('POSTGRES_USER', '').strip()
          db   = os.environ.get('POSTGRES_DB', '').strip()
          print(f'Host repr: {repr(host)}')
          print(f'Port repr: {repr(port)}')
          print(f'User repr: {repr(user)}')
          print(f'DB repr:   {repr(db)}')
          print(f'Host ends with .postgres.database.azure.com: {host.endswith(\".postgres.database.azure.com\")}')
          import psycopg2
          try:
              conn = psycopg2.connect(
                  host=host, port=int(port) if port else 5432,
                  user=user, password=os.environ.get('POSTGRES_PASSWORD','').strip(),
                  dbname=db, connect_timeout=10,
                  sslmode='require'
              )
              cur = conn.cursor()
              cur.execute('SELECT COUNT(*) FROM raw_measurements')
              print(f'✅ DB connected! raw_measurements rows: {cur.fetchone()[0]}')
              conn.close()
          except Exception as e:
              print(f'❌ DB connection failed: {e}')
              raise
          # Verify OPENAQ keys are clean
          import re
          raw = os.environ.get('OPENAQ_KEYS', '')
          normalized = re.sub(r'[\r\n]+', ',', raw)
          keys = [k.strip() for k in normalized.split(',') if k.strip()]
          print(f'🔑 OPENAQ_KEYS: {len(keys)} keys found (raw length: {len(raw)})')
          for i, k in enumerate(keys):
              print(f'  Key {i+1}: length={len(k)}, has_newline={chr(10) in k}, has_cr={chr(13) in k}')
          "

      - name: 🌐 Step 1 - Fetch Latest OpenAQ & NASA POWER Data
        run: |
          echo "Starting Data Collection..."
          python scripts/run_daily_collector.py --incremental-only

      - name: 🧹 Step 1b - Run Daily ETL Pipeline
        run: |
          echo "Starting Cleaning, Feature Engineering, and Weather Backfill..."
          python -u scripts/run_daily_etl.py

      - name: 🧠 Step 2 - Run 30-Day V12 ONNX Predictions & Deploy
        env:
          FRONTEND_PAT: ${{ secrets.FRONTEND_PAT }}
        run: |
          echo "Cloning frontend repo to allow prediction sync..."
          cd ..
          git clone https://${FRONTEND_PAT}@github.com/divyanshailani/global-aq-intelligence-web.git global-aq-intelligence-web
          
          # Go back to pipeline dir to run predictions
          cd global-aq-intelligence-pipeline

          echo "Running XGBoost V12 ONNX Models..."
          python scripts/predict_v12_onnx.py
          
          echo "Pushing new predictions to the UI..."
          # The script saves to site_data/ natively. Copy it manually just to be safe.
          cp site_data/*.json ../global-aq-intelligence-web/public/data/
          
          cd ../global-aq-intelligence-web
          git config user.name "Global AQI Bot"
          git config user.email "bot@globalaqi.com"
          git add public/data/
          git commit -m "auto: Daily V12 ONNX Predictions Update 🚀" || echo "No changes to commit"
          git push
