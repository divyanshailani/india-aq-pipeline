name: Global AQI Daily Pipeline

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the pipeline from the GitHub UI

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest
    
    env:
      # Database connection (Points to Azure Flexible PostgreSQL)
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      
      # API Keys
      OPENAQ_KEYS: ${{ secrets.OPENAQ_KEYS }}
      # Add other API keys here if needed (e.g., VISUAL_CROSSING_KEY)

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Automatically caches pip dependencies to speed up runs

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Step 1 - Fetch Latest OpenAQ & NASA POWER Data
        run: |
          echo "Starting Data Collection..."
          python scripts/run_daily_collector.py --incremental-only

      - name: 🧹 Step 1b - Run Daily ETL Pipeline
        run: |
          echo "Starting Cleaning, Feature Engineering, and Weather Backfill..."
          python scripts/run_daily_etl.py

      - name: 🧠 Step 2 - Run 30-Day Predictions & Deploy
        env:
          FRONTEND_PAT: ${{ secrets.FRONTEND_PAT }}
        run: |
          echo "Cloning frontend repo to allow prediction sync..."
          cd ..
          git clone https://${FRONTEND_PAT}@github.com/divyanshailani/global-aq-intelligence.git global-aq-intelligence
          
          # Go back to pipeline dir to run predictions
          cd pow-eda-pipeline

          echo "Running XGBoost v11 Models..."
          python scripts/predict_pipeline.py
          
          # The pipeline script automatically copied data to ../global-aq-intelligence/public/data
          echo "Pushing new predictions to the UI..."
          cd ../global-aq-intelligence
          git config user.name "Global AQI Bot"
          git config user.email "bot@globalaqi.com"
          git add public/data/
          git commit -m "auto: Daily AI Predictions Update 🚀" || echo "No changes to commit"
          git push
